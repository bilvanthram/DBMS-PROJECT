services:
  # 1. API Gateway
  - type: web
    name: my-api-gateway
    env: node
    rootDir: gateway
    buildCommand: npm install
    startCommand: node server.js

  # 2. Core Backend Service
  - type: web
    name: my-core-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        value: YOUR_EXTERNAL_DATABASE_CONNECTION_STRING_HERE

  # 3. Task Service / Background Worker
  - type: worker
    name: my-task-service
    env: node
    rootDir: taskservices
    buildCommand: npm install
    startCommand: node worker.js
    envVars:
      - key: DATABASE_URL
        value: YOUR_EXTERNAL_DATABASE_CONNECTION_STRING_HERE

  # 4. Frontend Static Site
  - type: web
    name: my-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
